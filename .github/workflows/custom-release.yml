name: Custom Release

on:
  push:
    tags:
      - "custom-v*"

jobs:
  build-custom:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      TESTBLOX_BUILD_LLM_API_BASE_URL: ${{ vars.TESTBLOX_BUILD_LLM_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build custom release
        run: npm run build:custom

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
